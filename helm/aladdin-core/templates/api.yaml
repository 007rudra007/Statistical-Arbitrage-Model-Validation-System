apiVersion: apps/v1
kind: Deployment
metadata:
  name: aladdin-api
  labels:
    app: aladdin-api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: aladdin-api
  template:
    metadata:
      labels:
        app: aladdin-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: kite-secret
---
apiVersion: v1
kind: Service
metadata:
  name: aladdin-api
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: 8000
      name: http
  selector:
    app: aladdin-api
