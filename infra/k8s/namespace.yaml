apiVersion: v1
kind: Namespace
metadata:
  name: aladdin
  labels:
    app.kubernetes.io/managed-by: helm
    environment: local
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: aladdin-quota
  namespace: aladdin
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 4Gi
    limits.cpu: "8"
    limits.memory: 8Gi
    pods: "20"
