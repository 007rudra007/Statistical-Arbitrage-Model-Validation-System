apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kite-api-credentials
  namespace: aladdin-prod
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: kite-secret
    creationPolicy: Owner
  data:
  - secretKey: KITE_API_KEY
    remoteRef:
      key: secret/data/aladdin/kite
      property: api_key
  - secretKey: FIX_HOST
    remoteRef:
      key: secret/data/aladdin/kite
      property: fix_host
